<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aktive Duplikat-Markierungen</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#f5f7fb;color:#1f2937;margin:0;padding:1rem}
    .wrap{max-width:1100px;margin:0 auto}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
    .title{font-size:1.4rem;font-weight:700}
    .sub{color:#6b7280;font-size:.9rem}
    .btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:.45rem .7rem;cursor:pointer}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:.8rem;margin-top:.8rem}
    .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:.5rem;margin-top:.7rem}
    .inp{border:1px solid #cbd5e1;border-radius:8px;padding:.45rem .55rem;font:inherit}
    table{width:100%;border-collapse:collapse;font-size:.88rem}
    th,td{padding:.48rem .45rem;border-bottom:1px solid #eef2f7;text-align:left;vertical-align:top}
    th{background:#f8fafc;font-weight:700;position:sticky;top:0}
    .muted{color:#6b7280}
    .error{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239;border-radius:8px;padding:.55rem;margin-top:.6rem}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <div class="title">Aktive Duplikat-Markierungen</div>
        <div class="sub">Nur aktive Einträge aus /api/duplicate_markierungen (restored_at is null)</div>
      </div>
      <button class="btn" onclick="loadData()">Neu laden</button>
    </div>
    <div class="filters">
      <input id="filter-name" class="inp" placeholder="Filter Name (ab 3 Zeichen)" oninput="applyFilters()">
      <input id="filter-address" class="inp" placeholder="Filter Adresse (ab 3 Zeichen)" oninput="applyFilters()">
      <button class="btn" onclick="resetFilters()">Filter zurücksetzen</button>
    </div>
    <div id="meta" class="sub" style="margin-top:.6rem"></div>
    <div id="err"></div>
    <div class="card">
      <div style="overflow:auto;max-height:75vh">
        <table>
          <thead>
            <tr>
              <th>Adresse</th>
              <th>Name</th>
              <th>Markiert von</th>
              <th>Markiert am</th>
              <th>Grund</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    const state={marks:[],nameById:{}};
    function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function fmt(ts){
      if(!ts)return '';
      const d=new Date(ts);
      if(Number.isNaN(d.getTime()))return String(ts);
      return d.toLocaleString('de-AT',{timeZone:'Europe/Vienna',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    function authHeader(){
      try{
        const raw=localStorage.getItem('nv_docs_token');
        if(!raw)return {};
        const parsed=JSON.parse(raw);
        if(!parsed||!parsed.token)return {};
        if(parsed.exp&&Date.now()>parsed.exp)return {};
        return {Authorization:'Bearer '+parsed.token};
      }catch(_e){return {};}
    }
    function norm(v){
      return String(v||'').trim().toLowerCase();
    }
    function filterActive(v){
      return norm(v).length>=3;
    }
    function renderRows(list){
      const rowsEl=document.getElementById('rows');
      if(!list.length){
        rowsEl.innerHTML='<tr><td colspan="5" class="muted">Keine aktiven Markierungen gefunden.</td></tr>';
        return;
      }
      rowsEl.innerHTML=list.map(m=>{
        const addr=esc(`${m.strasse||''} ${m.hausnummer||''}, ${m.plz||''} ${m.ort||'Wien'}`.trim());
        const name=esc([m.titel,m.arzt_name].filter(Boolean).join(' ')||'Unbekannt');
        const markedBy=esc(state.nameById[m.markiert_von]||m.markiert_von||'');
        return `<tr>
          <td>${addr}</td>
          <td>${name}</td>
          <td>${markedBy}</td>
          <td>${esc(fmt(m.markiert_am))}</td>
          <td>${esc(m.grund||'')}</td>
        </tr>`;
      }).join('');
    }
    function applyFilters(){
      const nameNeedle=norm(document.getElementById('filter-name')?.value||'');
      const addrNeedle=norm(document.getElementById('filter-address')?.value||'');
      const useName=filterActive(nameNeedle);
      const useAddr=filterActive(addrNeedle);
      const out=state.marks.filter(m=>{
        const fullName=norm([m.titel,m.arzt_name].filter(Boolean).join(' '));
        const addr=norm(`${m.strasse||''} ${m.hausnummer||''} ${m.plz||''} ${m.ort||''}`);
        if(useName&&!fullName.includes(nameNeedle))return false;
        if(useAddr&&!addr.includes(addrNeedle))return false;
        return true;
      });
      document.getElementById('meta').textContent=`Aktive Einträge: ${out.length} / ${state.marks.length}`;
      renderRows(out);
    }
    function resetFilters(){
      const n=document.getElementById('filter-name');
      const a=document.getElementById('filter-address');
      if(n)n.value='';
      if(a)a.value='';
      applyFilters();
    }
    async function loadData(){
      const err=document.getElementById('err');
      const rowsEl=document.getElementById('rows');
      err.innerHTML='';
      rowsEl.innerHTML='<tr><td colspan="5" class="muted">Lade ...</td></tr>';
      try{
        const h=authHeader();
        const [mr,ur]=await Promise.all([
          fetch('/api/duplicate_markierungen?select=*&restored_at=is.null', {headers:h}),
          fetch('/api/benutzer?select=id,name', {headers:h})
        ]);
        if(!mr.ok)throw new Error('HTTP '+mr.status+' beim Laden der Duplikat-Tabelle');
        const marks=await mr.json();
        const users=ur.ok?await ur.json():[];
        state.nameById={};
        users.forEach(u=>{state.nameById[u.id]=u.name;});
        state.marks=Array.isArray(marks)?marks:[];
        applyFilters();
      }catch(e){
        rowsEl.innerHTML='';
        err.innerHTML='<div class="error">'+esc(e.message||e)+'</div>';
      }
    }
    loadData();
  </script>
</body>
</html>
